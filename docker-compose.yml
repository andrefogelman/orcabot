version: '3.8'
services:
  orcabot:
    build: .
    container_name: orcabot
    restart: unless-stopped
    ports:
      - "8200:8200"  # LLM Proxy
      - "8300:8300"  # API Channel
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./groups:/app/groups
      - ./agents:/app/agents
      - /var/run/docker.sock:/var/run/docker.sock  # For spawning agent containers
    networks:
      - orcabot

networks:
  orcabot:
    driver: bridge
